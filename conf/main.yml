main:
  workers: 4
  port: 1080
  listen-address: '::'
  listen-ipv6-only: false
  domain-address-type: unspec

auth:
  file: conf/auth.json

ip-pool:
  ipv6-prefix: '2a0a:8dc0:1139::'
  ipv6-prefix-len: 48
  mode: rotate
  sticky-ttl: 600
  force-ipv6: true       # force IPv6 resolution when pool is active

misc:
  connect-timeout: 30000
  # log-file: stderr
  # log-level: warn
#  pid-file: /run/skyproxy.pid
  limit-nofile: 65535
